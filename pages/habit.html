<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>習慣チェック - 生活OS</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    .progress-wrap {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 16px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
    }

    .progress-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #7aa8ff);
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    .all-done-banner {
      background: var(--success-light);
      color: var(--success);
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid #bbf7d0;
      display: none;
    }

    .section-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      padding: 16px 16px 6px;
    }

    .section-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin: 0 16px 12px;
    }

    .section-wrap { display: block; }
    .section-wrap.empty { display: none; }

    .habit-row {
      display: flex;
      align-items: center;
      background: var(--card);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
      gap: 14px;
    }

    .habit-row:active { background: #f8f9fb; }
    .habit-row:last-child { border-bottom: none; }

    .habit-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .done-row .habit-check {
      background: var(--success);
      border-color: var(--success);
    }

    .check-icon {
      display: none;
      color: white;
      font-size: 14px;
      line-height: 1;
      margin-top: -1px;
    }

    .done-row .check-icon { display: block; }

    .habit-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .done-row .habit-label {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .done-section-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      letter-spacing: 0.08em;
      padding: 16px 16px 6px;
    }

    .edit-toggle-btn.active-edit {
      color: var(--primary);
      font-weight: 700;
    }

    .reorder-btns {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .reorder-btn {
      width: 30px;
      height: 22px;
      font-size: 11px;
      padding: 0;
      color: var(--text-sub);
    }

    .reorder-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .empty-section-msg {
      padding: 16px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    .add-habit-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--card);
      padding: 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header class="page-header">
    <button class="back-btn" onclick="history.back()">← 戻る</button>
    <h1>習慣チェック</h1>
    <button class="btn-icon edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">✏️</button>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-top">
      <span class="progress-text" id="progressDate"></span>
      <span class="progress-count" id="progressCount"></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="all-done-banner" id="allDoneBanner">🎉 今日のルーティン全部完了！</div>

  <main class="page-main" style="padding-top:12px;">

    <div class="section-wrap" id="wrapMorning">
      <div class="section-header">🌅 朝のルーティン</div>
      <div class="section-card" id="morningList"></div>
    </div>

    <div class="section-wrap" id="wrapEvening">
      <div class="section-header">🌙 夜のルーティン</div>
      <div class="section-card" id="eveningList"></div>
    </div>

    <div class="section-wrap empty" id="wrapDone">
      <div class="done-section-header">✅ 終了</div>
      <div class="section-card" id="doneList"></div>
    </div>

  </main>

  <button class="fab" id="addFab" onclick="openAddModal()">＋</button>

  <!-- 追加・編集モーダル -->
  <div class="modal-overlay hidden" id="habitModalOverlay" onclick="habitOverlayClick(event)">
    <div class="modal">
      <div class="modal-title">
        <span id="habitModalTitle">習慣を追加</span>
        <button class="btn-icon" onclick="closeHabitModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">習慣名 ＊</label>
        <input type="text" class="form-input" id="fHabitLabel" placeholder="例：ストレッチ">
      </div>
      <div class="form-group">
        <label class="form-label">時間帯</label>
        <select class="form-select" id="fHabitSection">
          <option value="morning">🌅 朝のルーティン</option>
          <option value="evening">🌙 夜のルーティン</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeHabitModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveHabitModal()">保存する</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const HABITS_KEY = 'life_habit_habits';
    const CHECKS_KEY = 'life_habit';

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function loadHabits() {
      try {
        const raw = localStorage.getItem(HABITS_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    }

    function saveHabits(h) {
      localStorage.setItem(HABITS_KEY, JSON.stringify(h));
    }

    function seedHabits() {
      const mk = label => ({ id: genId(), label });
      return {
        morning: ['薬を飲む', 'サプリを飲む', 'プロテインを飲む', '歯磨き', '光浴', 'ひげ剃り'].map(mk),
        evening: ['歯磨き', 'フロス', 'アロマ', '加湿器'].map(mk),
      };
    }

    // 初回のみ：旧形式（idx指定チェック）から新形式（id指定チェック）へ本日分を引き継ぐ
    let migratedChecks = null;
    let habits = loadHabits();
    if (!habits) {
      habits = seedHabits();
      try {
        const rawOld = localStorage.getItem(CHECKS_KEY);
        if (rawOld) {
          const old = JSON.parse(rawOld);
          if (old && old.date === todayStr() && old.checks) {
            const orderedIds = [...habits.morning, ...habits.evening].map(h => h.id);
            migratedChecks = {};
            orderedIds.forEach((id, idx) => {
              if (old.checks[idx]) migratedChecks[id] = true;
            });
          }
        }
      } catch {}
      saveHabits(habits);
    }

    function getAllHabits() {
      return [
        ...habits.morning.map(h => ({ ...h, section: 'morning' })),
        ...habits.evening.map(h => ({ ...h, section: 'evening' })),
      ];
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(CHECKS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }

    function saveState(s) {
      localStorage.setItem(CHECKS_KEY, JSON.stringify(s));
    }

    function freshState() {
      return { date: todayStr(), checks: migratedChecks || {} };
    }

    let state = loadState();
    if (!state || state.date !== todayStr()) {
      state = freshState();
      saveState(state);
    }

    let editMode = false;
    let editingHabitId = null;
    let editingHabitSection = null;

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('editToggleBtn');
      btn.textContent = editMode ? '完了' : '✏️';
      btn.classList.toggle('active-edit', editMode);
      render();
    }

    function openAddModal() {
      editingHabitId = null;
      document.getElementById('habitModalTitle').textContent = '習慣を追加';
      document.getElementById('fHabitLabel').value = '';
      document.getElementById('fHabitSection').value = 'morning';
      document.getElementById('habitModalOverlay').classList.remove('hidden');
      setTimeout(() => document.getElementById('fHabitLabel').focus(), 120);
    }

    function openEditHabitModal(id) {
      const h = getAllHabits().find(x => x.id === id);
      if (!h) return;
      editingHabitId = id;
      editingHabitSection = h.section;
      document.getElementById('habitModalTitle').textContent = '習慣を編集';
      document.getElementById('fHabitLabel').value = h.label;
      document.getElementById('fHabitSection').value = h.section;
      document.getElementById('habitModalOverlay').classList.remove('hidden');
    }

    function closeHabitModal() {
      document.getElementById('habitModalOverlay').classList.add('hidden');
      editingHabitId = null;
    }

    function habitOverlayClick(e) {
      if (e.target === document.getElementById('habitModalOverlay')) closeHabitModal();
    }

    function saveHabitModal() {
      const label = document.getElementById('fHabitLabel').value.trim();
      if (!label) { alert('習慣名を入力してください'); return; }
      const section = document.getElementById('fHabitSection').value;

      if (editingHabitId) {
        const oldSection = editingHabitSection;
        const idx = habits[oldSection].findIndex(h => h.id === editingHabitId);
        if (idx === -1) return;
        const item = habits[oldSection][idx];
        item.label = label;
        if (oldSection !== section) {
          habits[oldSection].splice(idx, 1);
          habits[section].push(item);
        }
        showToast('更新しました ✓');
      } else {
        habits[section].push({ id: genId(), label });
        showToast('追加しました ✓');
      }
      saveHabits(habits);
      closeHabitModal();
      render();
    }

    function deleteHabit(id, section) {
      if (!confirmDelete('この習慣を削除しますか？')) return;
      habits[section] = habits[section].filter(h => h.id !== id);
      delete state.checks[id];
      saveHabits(habits);
      saveState(state);
      render();
    }

    function moveHabit(id, section, dir) {
      const arr = habits[section];
      const idx = arr.findIndex(h => h.id === id);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= arr.length) return;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      saveHabits(habits);
      render();
    }

    function makeRow(habit, isDone) {
      const row = document.createElement('div');
      row.className = 'habit-row' + (isDone ? ' done-row' : '');
      row.innerHTML = `<div class="habit-check"><span class="check-icon">✓</span></div><div class="habit-label">${esc(habit.label)}</div>`;
      row.addEventListener('click', () => {
        state.checks[habit.id] = !state.checks[habit.id];
        saveState(state);
        render();
      });
      return row;
    }

    function makeEditRow(habit, isFirst, isLast) {
      const row = document.createElement('div');
      row.className = 'habit-row';
      row.innerHTML = `
        <div class="reorder-btns">
          <button class="btn-icon reorder-btn" ${isFirst ? 'disabled' : ''}>▲</button>
          <button class="btn-icon reorder-btn" ${isLast ? 'disabled' : ''}>▼</button>
        </div>
        <div class="habit-label">${esc(habit.label)}</div>
        <button class="btn-icon delete-habit-btn">🗑️</button>`;
      const [upBtn, downBtn] = row.querySelectorAll('.reorder-btn');
      upBtn.addEventListener('click', e => { e.stopPropagation(); moveHabit(habit.id, habit.section, -1); });
      downBtn.addEventListener('click', e => { e.stopPropagation(); moveHabit(habit.id, habit.section, 1); });
      row.querySelector('.habit-label').addEventListener('click', () => openEditHabitModal(habit.id));
      row.querySelector('.delete-habit-btn').addEventListener('click', e => {
        e.stopPropagation();
        deleteHabit(habit.id, habit.section);
      });
      return row;
    }

    function renderEditSection(el, list, section) {
      el.innerHTML = '';
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-section-msg">習慣がありません</div>';
        return;
      }
      list.forEach((h, i) => {
        el.appendChild(makeEditRow({ ...h, section }, i === 0, i === list.length - 1));
      });
    }

    function render() {
      document.getElementById('progressWrap').style.display = editMode ? 'none' : '';
      document.getElementById('wrapDone').style.display = editMode ? 'none' : '';

      const morningEl = document.getElementById('morningList');
      const eveningEl = document.getElementById('eveningList');
      const doneEl    = document.getElementById('doneList');

      if (editMode) {
        renderEditSection(morningEl, habits.morning, 'morning');
        renderEditSection(eveningEl, habits.evening, 'evening');
        doneEl.innerHTML = '';
        document.getElementById('wrapMorning').classList.remove('empty');
        document.getElementById('wrapEvening').classList.remove('empty');
        document.getElementById('allDoneBanner').style.display = 'none';
        return;
      }

      morningEl.innerHTML = '';
      eveningEl.innerHTML = '';
      doneEl.innerHTML    = '';

      const allHabits = getAllHabits();
      const pending = { morning: [], evening: [] };
      const done = [];

      allHabits.forEach(habit => {
        if (state.checks[habit.id]) {
          done.push(habit);
        } else {
          pending[habit.section].push(habit);
        }
      });

      pending.morning.forEach(h => morningEl.appendChild(makeRow(h, false)));
      pending.evening.forEach(h => eveningEl.appendChild(makeRow(h, false)));
      done.forEach(h => doneEl.appendChild(makeRow(h, true)));

      document.getElementById('wrapMorning').classList.toggle('empty', pending.morning.length === 0);
      document.getElementById('wrapEvening').classList.toggle('empty', pending.evening.length === 0);
      document.getElementById('wrapDone').classList.toggle('empty', done.length === 0);

      const total = allHabits.length;
      const doneCount = done.length;
      const pct = total === 0 ? 0 : Math.round(doneCount / total * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressCount').textContent = `${doneCount} / ${total}`;
      document.getElementById('allDoneBanner').style.display = (total > 0 && doneCount === total) ? 'block' : 'none';
    }

    const now = new Date();
    const dow = '日月火水木金土'[now.getDay()];
    document.getElementById('progressDate').textContent =
      `${now.getMonth()+1}月${now.getDate()}日（${dow}）`;

    render();
  </script>
</body>
</html>
