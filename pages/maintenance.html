<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>整備管理 | 生活OS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="page-header">
    <button class="back-btn" onclick="location.href='../index.html'">◀ ホーム</button>
    <h1>🔧 整備管理</h1>
  </header>

  <main class="page-main">
    <div class="card" style="margin-bottom:12px">
      <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <div>
          <div style="font-size:12px;color:var(--text-sub, #888)">🚗 現在の走行距離</div>
          <div style="font-size:20px;font-weight:700" id="mileageDisplay">未設定</div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="editMileage()">✏️ 更新</button>
      </div>
    </div>

    <div id="listContainer"></div>
  </main>

  <button class="fab" onclick="openModal()">＋</button>

  <div class="modal-overlay hidden" id="modalOverlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-title">
        <span id="modalTitle">整備項目を追加</span>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">項目 ＊</label>
        <select class="form-select" id="fPreset" onchange="applyPreset()">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group hidden" id="customNameGroup">
        <label class="form-label">項目名（自由入力）＊</label>
        <input type="text" class="form-input" id="fName" placeholder="例：ワイパーゴム交換">
      </div>

      <div class="form-group">
        <label class="form-label">前回実施日（任意）</label>
        <div style="display:flex;gap:6px">
          <select class="form-select" id="fLastDateY" style="flex:1.2;min-width:0"></select>
          <select class="form-select" id="fLastDateM" style="flex:1;min-width:0"></select>
          <select class="form-select" id="fLastDateD" style="flex:1;min-width:0"></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">次回予定日</label>
          <div style="display:flex;gap:6px">
            <select class="form-select" id="fNextDateY" style="flex:1.2;min-width:0"></select>
            <select class="form-select" id="fNextDateM" style="flex:1;min-width:0"></select>
            <select class="form-select" id="fNextDateD" style="flex:1;min-width:0"></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">次回予定の走行距離(km)</label>
          <input type="number" class="form-input" id="fNextKm" min="0" placeholder="例：35000">
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-sub, #888);margin:-8px 0 12px">
        次回予定日・次回予定の走行距離は、どちらか一方または両方を入力してください
      </div>

      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="fNotes" placeholder="店舗名・部品番号など（任意）"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveItem()">保存する</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const KEY      = 'life_maintenance';
    const META_KEY = 'life_maintenance_meta';
    let editingId  = null;

    // 項目名の候補（一般的な軽自動車・バンでよくある整備項目）
    const PRESETS = [
      'エンジンオイル交換',
      'オイルエレメント交換',
      '車検',
      'ブレーキパッド点検・交換',
      'タイヤ点検・ローテーション',
      'バッテリー交換',
      'ワイパーゴム交換',
      'エアコンフィルター交換',
      'その他（自由入力）'
    ];

    function initPresetSelect() {
      const sel = document.getElementById('fPreset');
      PRESETS.forEach((name, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    function applyPreset() {
      const idx = document.getElementById('fPreset').value;
      const customGroup = document.getElementById('customNameGroup');
      if (idx === '') { customGroup.classList.add('hidden'); return; }
      const isCustom = Number(idx) === PRESETS.length - 1;
      if (isCustom) {
        customGroup.classList.remove('hidden');
        document.getElementById('fName').value = '';
      } else {
        customGroup.classList.add('hidden');
        document.getElementById('fName').value = PRESETS[idx];
      }
    }

    function getMeta() {
      try { return JSON.parse(localStorage.getItem(META_KEY) || '{}'); } catch { return {}; }
    }

    function setMeta(meta) {
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }

    function editMileage() {
      const meta = getMeta();
      const cur = meta.mileage != null ? meta.mileage : '';
      const val = prompt('現在の走行距離（km）を入力してください', cur);
      if (val === null) return;
      const num = parseInt(val);
      if (isNaN(num) || num < 0) { alert('正しい数値を入力してください'); return; }
      setMeta({ mileage: num, updatedAt: new Date().toISOString() });
      showToast('走行距離を更新しました ✓');
      renderMileage();
      render();
    }

    function renderMileage() {
      const meta = getMeta();
      const el = document.getElementById('mileageDisplay');
      el.textContent = meta.mileage != null ? `${meta.mileage.toLocaleString()} km` : '未設定';
    }

    // 年→月→日のセレクトで日付を入力する（選ぶと自動的に次のセレクトへフォーカス移動）
    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function buildDateSelect(prefix) {
      const ySel = document.getElementById(prefix + 'Y');
      const mSel = document.getElementById(prefix + 'M');
      const dSel = document.getElementById(prefix + 'D');
      const thisYear = new Date().getFullYear();

      let yHtml = '<option value="">年</option>';
      for (let y = thisYear - 5; y <= thisYear + 6; y++) yHtml += `<option value="${y}">${y}年</option>`;
      ySel.innerHTML = yHtml;

      let mHtml = '<option value="">月</option>';
      for (let m = 1; m <= 12; m++) mHtml += `<option value="${m}">${m}月</option>`;
      mSel.innerHTML = mHtml;

      updateDayOptions(prefix);

      ySel.addEventListener('change', () => { updateDayOptions(prefix); mSel.focus(); });
      mSel.addEventListener('change', () => { updateDayOptions(prefix); dSel.focus(); });
    }

    function updateDayOptions(prefix) {
      const ySel = document.getElementById(prefix + 'Y');
      const mSel = document.getElementById(prefix + 'M');
      const dSel = document.getElementById(prefix + 'D');
      const prevDay = dSel.value;
      const maxDay = (ySel.value && mSel.value) ? daysInMonth(parseInt(ySel.value), parseInt(mSel.value)) : 31;

      let dHtml = '<option value="">日</option>';
      for (let d = 1; d <= maxDay; d++) dHtml += `<option value="${d}">${d}日</option>`;
      dSel.innerHTML = dHtml;
      if (prevDay && parseInt(prevDay) <= maxDay) dSel.value = prevDay;
    }

    function getDateValue(prefix) {
      const y = document.getElementById(prefix + 'Y').value;
      const m = document.getElementById(prefix + 'M').value;
      const d = document.getElementById(prefix + 'D').value;
      if (!y || !m || !d) return '';
      return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function setDateValue(prefix, dateStr) {
      const ySel = document.getElementById(prefix + 'Y');
      const mSel = document.getElementById(prefix + 'M');
      const dSel = document.getElementById(prefix + 'D');
      if (!dateStr) {
        ySel.value = '';
        mSel.value = '';
        updateDayOptions(prefix);
        dSel.value = '';
        return;
      }
      const [y, m, d] = dateStr.split('-');
      ySel.value = String(parseInt(y));
      mSel.value = String(parseInt(m));
      updateDayOptions(prefix);
      dSel.value = String(parseInt(d));
    }

    function daysBetween(fromStr, toStr) {
      const a = new Date(fromStr + 'T00:00:00');
      const b = new Date(toStr + 'T00:00:00');
      return Math.round((b - a) / 86400000);
    }

    // 整備1件の状態（残り日数・残りkm・緊急度）を計算
    function computeStatus(item) {
      const todayStr = today();
      const meta = getMeta();

      const daysLeft = item.nextDate ? daysBetween(todayStr, item.nextDate) : null;
      const kmLeft = (item.nextKm != null && meta.mileage != null) ? item.nextKm - meta.mileage : null;

      const overdue = (daysLeft !== null && daysLeft < 0) || (kmLeft !== null && kmLeft < 0);
      const soon = !overdue && ((daysLeft !== null && daysLeft <= 14) || (kmLeft !== null && kmLeft <= 300));

      let level = 'ok';
      if (overdue) level = 'overdue';
      else if (soon) level = 'soon';

      return { daysLeft, kmLeft, level };
    }

    function openModal(id) {
      editingId = id || null;
      document.getElementById('modalTitle').textContent = id ? '整備項目を編集' : '整備項目を追加';
      document.getElementById('modalOverlay').classList.remove('hidden');
      document.getElementById('customNameGroup').classList.add('hidden');

      if (id) {
        const item = Storage.get(KEY).find(i => i.id === id);
        if (item) {
          document.getElementById('fPreset').value = '';
          document.getElementById('fName').value    = item.name || '';
          setDateValue('fLastDate', item.lastDate || '');
          setDateValue('fNextDate', item.nextDate || '');
          document.getElementById('fNextKm').value    = item.nextKm != null ? item.nextKm : '';
          document.getElementById('fNotes').value     = item.notes || '';
          document.getElementById('customNameGroup').classList.remove('hidden');
        }
      } else {
        document.getElementById('fPreset').value = '';
        document.getElementById('fName').value = '';
        setDateValue('fLastDate', '');
        setDateValue('fNextDate', '');
        document.getElementById('fNextKm').value = '';
        document.getElementById('fNotes').value = '';
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      editingId = null;
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function saveItem() {
      const name = document.getElementById('fName').value.trim();
      const lastDate = getDateValue('fLastDate');
      const nextDate = getDateValue('fNextDate');
      const nextKmVal = document.getElementById('fNextKm').value;

      if (!name) { alert('項目名を入力してください'); return; }
      if (!nextDate && nextKmVal === '') {
        alert('次回予定日または次回予定の走行距離のどちらかを入力してください');
        return;
      }

      const data = {
        name,
        lastDate: lastDate || '',
        nextDate: nextDate || '',
        nextKm: nextKmVal !== '' ? parseInt(nextKmVal) : null,
        notes: document.getElementById('fNotes').value.trim()
      };

      if (editingId) {
        Storage.update(KEY, editingId, data);
        showToast('更新しました ✓');
      } else {
        Storage.add(KEY, data);
        showToast('追加しました ✓');
      }
      closeModal();
      render();
    }

    function deleteItem(id) {
      if (!confirmDelete('この整備項目を削除しますか？')) return;
      Storage.remove(KEY, id);
      showToast('削除しました');
      render();
    }

    function levelBadge(level) {
      if (level === 'overdue') return '<span class="badge badge-danger">期限切れ</span>';
      if (level === 'soon')    return '<span class="badge badge-warning">まもなく</span>';
      return '';
    }

    function render() {
      const items = Storage.get(KEY);
      const container = document.getElementById('listContainer');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔧</div>
            <div class="empty-state-text">登録された整備項目がありません</div>
            <div class="empty-state-sub">＋ ボタンで追加できます</div>
          </div>`;
        return;
      }

      // 緊急度（期限切れ→まもなく→余裕あり）の順に並べ、同じ緊急度の中では日数・距離が近い順に並べる
      const withStatus = items.map(item => ({ item, status: computeStatus(item) }));
      const levelOrder = { overdue: 0, soon: 1, ok: 2 };
      withStatus.sort((a, b) => {
        if (levelOrder[a.status.level] !== levelOrder[b.status.level]) {
          return levelOrder[a.status.level] - levelOrder[b.status.level];
        }
        const aDays = a.status.daysLeft, bDays = b.status.daysLeft;
        if (aDays !== null && bDays !== null) return aDays - bDays;
        if (aDays !== null) return -1;
        if (bDays !== null) return 1;
        const aKm = a.status.kmLeft, bKm = b.status.kmLeft;
        if (aKm !== null && bKm !== null) return aKm - bKm;
        if (aKm !== null) return -1;
        if (bKm !== null) return 1;
        return 0;
      });

      let html = '<div class="card">';
      withStatus.forEach(({ item, status }) => {
        const dateInfo = item.nextDate
          ? `次回予定日: ${formatDate(item.nextDate)}${status.daysLeft >= 0 ? `（あと${status.daysLeft}日）` : `（${Math.abs(status.daysLeft)}日超過）`}`
          : '';
        const kmInfo = item.nextKm != null
          ? `次回予定: ${item.nextKm.toLocaleString()}km${status.kmLeft != null ? `（残り${status.kmLeft.toLocaleString()}km）` : ''}`
          : '';

        html += `
          <div class="list-item" style="background:${status.level === 'overdue' ? 'var(--danger-light)' : status.level === 'soon' ? 'var(--warning-light)' : ''}">
            <div class="list-item-body">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="list-item-title">${esc(item.name)}</span>
                ${levelBadge(status.level)}
              </div>
              ${item.lastDate ? `<div class="list-item-sub">前回: ${formatDate(item.lastDate)}</div>` : ''}
              ${dateInfo ? `<div class="list-item-sub">${dateInfo}</div>` : ''}
              ${kmInfo ? `<div class="list-item-sub">${kmInfo}</div>` : ''}
              ${item.notes ? `<div class="list-item-sub">${esc(item.notes)}</div>` : ''}
            </div>
            <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
              <button class="btn-icon" onclick="openModal('${item.id}')">✏️</button>
              <button class="btn-icon" onclick="deleteItem('${item.id}')">🗑️</button>
            </div>
          </div>`;
      });
      html += '</div>';

      container.innerHTML = html;
    }

    initPresetSelect();
    buildDateSelect('fLastDate');
    buildDateSelect('fNextDate');
    renderMileage();
    render();
  </script>
</body>
</html>
