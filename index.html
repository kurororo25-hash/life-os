<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>生活OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="生活OS">
  <style>
    body { background: var(--bg); }
  </style>
</head>
<body>
  <!-- 通知許可バナー -->
  <div id="notifBanner" class="hidden" style="
    background:#4a7dff;color:white;padding:12px 16px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-size:13px;font-weight:600;">
    <span style="flex:1">⏰ リマインダーの通知を受け取りますか？</span>
    <button onclick="Notif.requestPermission()" style="
      background:white;color:#4a7dff;border:none;border-radius:6px;
      padding:6px 14px;font-weight:700;cursor:pointer;font-size:13px;">
      許可する
    </button>
    <button onclick="document.getElementById('notifBanner').classList.add('hidden')" style="
      background:transparent;color:white;border:1px solid rgba(255,255,255,0.6);
      border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;">
      後で
    </button>
  </div>

  <header class="home-header">
    <h1>🏠 生活OS</h1>
    <p class="home-date" id="homeDate"></p>
  </header>

  <!-- PC・スマホ同期 -->
  <div style="background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;
              display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px">
    <span style="font-weight:700">🔄 端末間同期</span>
    <span id="syncStatus" style="font-size:12px;color:var(--text-sub)">未接続</span>
    <span id="syncLastTime" style="font-size:11px;color:var(--text-muted)"></span>
    <div style="flex:1;min-width:4px"></div>
    <button id="syncSignInBtn" class="btn btn-sm btn-primary" onclick="Sync.signIn()">Googleでログインして同期</button>
    <button id="syncNowBtn" class="btn btn-sm btn-ghost hidden" onclick="Sync.syncNow()">今すぐ同期</button>
    <button id="syncSignOutBtn" class="btn btn-sm btn-ghost hidden" onclick="Sync.signOut()">ログアウト</button>
  </div>

  <main class="home-grid">
    <a href="pages/reminder.html" class="feature-card">
      <span class="card-icon">⏰</span>
      <span class="card-label">リマインダー</span>
      <span class="card-badge" id="badgeReminder"></span>
    </a>
    <a href="pages/timebox.html" class="feature-card">
      <span class="card-icon">⏱️</span>
      <span class="card-label">タイムボクシング</span>
      <span class="card-badge" id="badgeTimebox"></span>
    </a>
    <a href="pages/lifelog.html" class="feature-card">
      <span class="card-icon">📔</span>
      <span class="card-label">ライフログ</span>
    </a>
    <a href="pages/maintenance.html" class="feature-card">
      <span class="card-icon">🔧</span>
      <span class="card-label">整備管理</span>
      <span class="card-badge" id="badgeMaintenance"></span>
    </a>
    <a href="pages/habit.html" class="feature-card">
      <span class="card-icon">✅</span>
      <span class="card-label">習慣チェック</span>
      <span class="card-badge" id="badgeHabit"></span>
    </a>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script src="js/sync.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"
          onload="Sync.gisLoaded()"></script>
  <script src="js/notifications.js"></script>
  <script>
    // 通知の初期化（許可確認・リマインダーチェック）
    Notif.init();

    // 日付表示
    const d = new Date();
    const dow = '日月火水木金土'[d.getDay()];
    document.getElementById('homeDate').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow}）`;

    // バッジ表示関数
    function showBadge(id, count) {
      const el = document.getElementById(id);
      if (el && count > 0) {
        el.textContent = count;
        el.style.display = 'inline-flex';
      }
    }

    // リマインダー：今日以前の未完了件数
    const todayStr = new Date().toISOString().slice(0,10);
    const reminders = Storage.get('life_reminders');
    const pendingReminders = reminders.filter(r => !r.done && r.date && r.date <= todayStr);
    showBadge('badgeReminder', pendingReminders.length);

    // タイムボクシング：今日の未完了件数
    const timebox = Storage.get('life_timebox');
    const pendingTimebox = timebox.filter(t => !t.done && t.date === todayStr);
    showBadge('badgeTimebox', pendingTimebox.length);

    // 整備管理：期限切れ・まもなく の件数
    try {
      const maintenance = Storage.get('life_maintenance');
      let maintMeta = {};
      try { maintMeta = JSON.parse(localStorage.getItem('life_maintenance_meta') || '{}'); } catch {}

      const dueSoonCount = maintenance.filter(item => {
        const daysLeft = item.nextDate
          ? Math.round((new Date(item.nextDate + 'T00:00:00') - new Date(todayStr + 'T00:00:00')) / 86400000)
          : null;
        const kmLeft = (item.nextKm != null && maintMeta.mileage != null) ? item.nextKm - maintMeta.mileage : null;

        const overdue = (daysLeft !== null && daysLeft < 0) || (kmLeft !== null && kmLeft < 0);
        const soon = !overdue && ((daysLeft !== null && daysLeft <= 14) || (kmLeft !== null && kmLeft <= 300));
        return overdue || soon;
      }).length;
      showBadge('badgeMaintenance', dueSoonCount);
    } catch {}

    // 習慣チェック：当日の未完了件数
    try {
      const habitRaw = localStorage.getItem('life_habit');
      if (habitRaw) {
        const habit = JSON.parse(habitRaw);
        if (habit.date === todayStr) {
          const total = Object.keys(habit.checks).length;
          const done = Object.values(habit.checks).filter(Boolean).length;
          const remaining = total - done;
          if (remaining > 0) showBadge('badgeHabit', remaining);
        }
      }
    } catch {}
  </script>
</body>
</html>
