<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>在庫管理 | 生活OS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="page-header">
    <button class="back-btn" onclick="location.href='../index.html'">◀ ホーム</button>
    <h1>📦 在庫管理</h1>
  </header>

  <main class="page-main">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="品名・カテゴリで検索" oninput="render()">
    </div>
    <div id="alertSection"></div>
    <div id="listContainer"></div>
  </main>

  <button class="fab" onclick="openModal()">＋</button>

  <!-- 追加・編集モーダル -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-title">
        <span id="modalTitle">在庫を追加</span>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">品名 ＊</label>
        <input type="text" class="form-input" id="fName" placeholder="例：シャンプー">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <input type="text" class="form-input" id="fCategory" placeholder="例：日用品">
        </div>
        <div class="form-group">
          <label class="form-label">単位</label>
          <input type="text" class="form-input" id="fUnit" placeholder="例：本">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">現在の数量</label>
          <input type="number" class="form-input" id="fCurrent" value="1" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">最低在庫数</label>
          <input type="number" class="form-input" id="fMin" value="1" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">保管場所</label>
        <input type="text" class="form-input" id="fLocation" placeholder="例：洗面台下">
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-textarea" id="fNotes" placeholder="補足メモ（任意）"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveItem()">保存する</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/sync.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"
          onload="Sync.gisLoaded()"></script>
  <script>
    const KEY      = 'life_inventory';
    const SHOP_KEY = 'life_shopping';
    let editingId  = null;

    function openModal(id) {
      editingId = id || null;
      document.getElementById('modalTitle').textContent = id ? '在庫を編集' : '在庫を追加';
      document.getElementById('modalOverlay').classList.remove('hidden');

      if (id) {
        const item = Storage.get(KEY).find(i => i.id === id);
        if (item) {
          document.getElementById('fName').value     = item.name         || '';
          document.getElementById('fCategory').value = item.category     || '';
          document.getElementById('fUnit').value     = item.unit         || '';
          document.getElementById('fCurrent').value  = item.currentCount ?? 1;
          document.getElementById('fMin').value      = item.minCount     ?? 1;
          document.getElementById('fLocation').value = item.location     || '';
          document.getElementById('fNotes').value    = item.notes        || '';
        }
      } else {
        ['fName','fCategory','fUnit','fLocation','fNotes'].forEach(f => document.getElementById(f).value = '');
        document.getElementById('fCurrent').value = 1;
        document.getElementById('fMin').value     = 1;
      }
      setTimeout(() => document.getElementById('fName').focus(), 120);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      editingId = null;
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function saveItem() {
      const name = document.getElementById('fName').value.trim();
      if (!name) { alert('品名を入力してください'); return; }

      const data = {
        name,
        category:     document.getElementById('fCategory').value.trim(),
        unit:         document.getElementById('fUnit').value.trim(),
        currentCount: parseInt(document.getElementById('fCurrent').value) || 0,
        minCount:     parseInt(document.getElementById('fMin').value)     || 0,
        location:     document.getElementById('fLocation').value.trim(),
        notes:        document.getElementById('fNotes').value.trim()
      };

      if (editingId) {
        Storage.update(KEY, editingId, data);
        showToast('更新しました ✓');
      } else {
        Storage.add(KEY, data);
        showToast('追加しました ✓');
      }
      closeModal();
      render();
    }

    function changeCount(id, delta) {
      const item = Storage.get(KEY).find(i => i.id === id);
      if (!item) return;
      const newCount = Math.max(0, (item.currentCount || 0) + delta);
      Storage.update(KEY, id, { currentCount: newCount });
      render();
    }

    function deleteItem(id) {
      if (!confirmDelete('この在庫を削除しますか？')) return;
      Storage.remove(KEY, id);
      showToast('削除しました');
      render();
    }

    function addToShopping(id) {
      const item = Storage.get(KEY).find(i => i.id === id);
      if (!item) return;
      const shopping = Storage.get(SHOP_KEY);
      const exists = shopping.find(s => s.inventoryId === id && !s.bought);
      if (exists) { showToast('すでに買い物リストにあります'); return; }
      Storage.add(SHOP_KEY, {
        name: item.name,
        quantity: `1${item.unit || ''}`,
        category: item.category || '',
        source: 'inventory',
        inventoryId: id,
        bought: false,
        notes: ''
      });
      showToast('買い物リストに追加しました 🛒');
    }

    function addAllLowToShopping() {
      const items    = Storage.get(KEY);
      const shopping = Storage.get(SHOP_KEY);
      const lowItems = items.filter(i => (i.currentCount || 0) <= (i.minCount || 0) && i.minCount > 0);
      let added = 0;
      lowItems.forEach(item => {
        if (!shopping.find(s => s.inventoryId === item.id && !s.bought)) {
          Storage.add(SHOP_KEY, {
            name: item.name,
            quantity: `1${item.unit || ''}`,
            category: item.category || '',
            source: 'inventory',
            inventoryId: item.id,
            bought: false,
            notes: ''
          });
          added++;
        }
      });
      showToast(added > 0 ? `${added}件を買い物リストに追加しました 🛒` : 'すべて追加済みです');
      render();
    }

    function render() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const allItems = Storage.get(KEY);
      let items = allItems;

      if (query) {
        items = items.filter(i =>
          i.name.toLowerCase().includes(query) ||
          (i.category || '').toLowerCase().includes(query) ||
          (i.location || '').toLowerCase().includes(query)
        );
      }

      // 低在庫アラートバナー
      const lowItems = allItems.filter(i => (i.currentCount || 0) <= (i.minCount || 0) && i.minCount > 0);
      const alertEl = document.getElementById('alertSection');
      if (lowItems.length > 0) {
        alertEl.innerHTML = `
          <div class="card" style="border-left:4px solid var(--warning);margin-bottom:12px">
            <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
              <span>⚠️ <strong>${lowItems.length}件</strong>が在庫少です</span>
              <button class="btn btn-sm btn-warning" onclick="addAllLowToShopping()">
                まとめて買い物リストへ
              </button>
            </div>
          </div>`;
      } else {
        alertEl.innerHTML = '';
      }

      const container = document.getElementById('listContainer');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <div class="empty-state-text">${query ? '見つかりません' : '在庫がありません'}</div>
            <div class="empty-state-sub">＋ ボタンで追加できます</div>
          </div>`;
        return;
      }

      // カテゴリでグループ化
      const grouped = {};
      items.forEach(item => {
        const cat = item.category || '未分類';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(item);
      });

      let html = '';
      Object.keys(grouped).sort().forEach(cat => {
        html += `<div class="section-title">${esc(cat)}</div><div class="card">`;
        grouped[cat].forEach(item => {
          const isLow = (item.currentCount || 0) <= (item.minCount || 0) && item.minCount > 0;
          const unitStr = esc(item.unit || '');
          html += `
            <div class="list-item" style="background:${isLow ? 'var(--warning-light)' : ''}">
              <div class="list-item-body">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <span class="list-item-title">${esc(item.name)}</span>
                  ${isLow ? '<span class="badge badge-warning">在庫少</span>' : ''}
                </div>
                ${item.location ? `<div class="list-item-sub">📍 ${esc(item.location)}</div>` : ''}
                <div class="list-item-sub">最低在庫: ${item.minCount || 0}${unitStr}</div>
                ${item.notes ? `<div class="list-item-sub">${esc(item.notes)}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
                <div class="counter">
                  <button class="counter-btn" onclick="changeCount('${item.id}',-1)">−</button>
                  <span class="counter-val" style="color:${isLow ? 'var(--danger)' : 'inherit'}">${item.currentCount || 0}${unitStr}</span>
                  <button class="counter-btn" onclick="changeCount('${item.id}',1)">＋</button>
                </div>
                <div style="display:flex;gap:4px;align-items:center">
                  ${isLow ? `<button class="btn btn-sm btn-warning" onclick="addToShopping('${item.id}')">買う</button>` : ''}
                  <button class="btn-icon" onclick="openModal('${item.id}')">✏️</button>
                  <button class="btn-icon" onclick="deleteItem('${item.id}')">🗑️</button>
                </div>
              </div>
            </div>`;
        });
        html += '</div>';
      });

      container.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
